# golangci-lint configuration for fp-go/v2
# Requires golangci-lint v2 (https://golangci-lint.run)

version: "2"

linters:
  default: none
  enable:
    # Correctness
    - errcheck        # unchecked errors
    - govet           # go vet checks (enable-all below)
    - staticcheck     # staticcheck suite
    - unused          # unused code

    # Style / maintainability
    - misspell        # common spelling mistakes in comments and strings
    - unconvert       # unnecessary type conversions
    - unparam         # parameters always called with the same value

    # Complexity / clarity
    - cyclop          # cyclomatic complexity per function
    - dupl            # code duplication
    - gocritic        # unlambda: replace single-call closures with direct function references

  settings:
    cyclop:
      # Functional combinators are intentionally small; keep the threshold low.
      max-complexity: 10

    dupl:
      # Allow small repeated blocks common in generic combinator patterns.
      threshold: 150

    govet:
      enable-all: true
      disable:
        - shadow  # variable shadowing is common in functional-style code

    misspell:
      locale: US

    staticcheck:
      checks:
        - all
        - "-SA1019"  # ignore deprecation warnings (some stdlib symbols changed in 1.21+)

  exclusions:
    # Do not limit the number of issues reported per linter.
    rules:
      # Test files get relaxed rules.
      - path: "_test\\.go$"
        linters:
          - dupl
          - unparam
          - unused
          - gocritic

      # Generated files (runGenerators output) are exempt from duplication checks.
      - path: "gen\\.go$"
        linters:
          - dupl

    paths:
      - vendor

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      # Separate stdlib, external, and internal IBM imports into distinct groups.
      local-prefixes:
        - "github.com/IBM/fp-go"

output:
  formats:
    text:
      path: stdout
      colors: true
  sort-order:
    - file
    - linter

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
